<!doctype html>
<html lang="{{ site.language | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ seo.title | default: 'My Profile' }}</title>
  <meta name="description" content="{{ seo.description }}">
  <link rel="stylesheet" href="{{ 'assets/css/style.css' | asset_url }}">
</head>
<body>
  {% render 'sections/header.html' %}
  <main>
    <section class="page-hero"><div class="container"><span class="eyebrow">Profile</span><h1>Update your profile.</h1></div></section>
    <section class="section">
      <div class="container account-layout">
        <aside class="commerce-card account-sidebar">
          <a class="account-nav-link" href="{{ ecommerce.urls.account }}">Dashboard</a>
          <a class="account-nav-link" href="{{ ecommerce.urls.customer_orders }}">My Orders</a>
          <a class="account-nav-link" href="{{ ecommerce.urls.wishlist }}">Wishlist</a>
          <a class="account-nav-link" href="{{ ecommerce.urls.addresses }}">Address</a>
          <a class="account-nav-link is-active" href="{{ ecommerce.urls.profile }}">My Profile</a>
          <a class="account-nav-link" href="{{ ecommerce.urls.change_password }}">Change Password</a>
          <a class="account-nav-link danger" href="{{ ecommerce.urls.logout }}">Logout</a>
        </aside>
        <form class="commerce-card commerce-form-panel account-content" method="post" action="{{ profile_page.save_url }}">
          {{ forms.antiforgery_field }}
          <div class="commerce-grid">
            <label><span>First Name</span><input type="text" name="Input.FirstName" value="{{ profile_page.input.first_name }}"></label>
            <label><span>Last Name</span><input type="text" name="Input.LastName" value="{{ profile_page.input.last_name }}"></label>
            <label><span>Email</span><input type="email" value="{{ profile_page.input.email }}" disabled></label>
            <label><span>Phone</span><input type="text" name="Input.Phone" value="{{ profile_page.input.phone }}"></label>
          </div>
          <button class="btn btn-primary" type="submit">Save Profile</button>
        </form>
      </div>
    </section>
  </main>
  {% render 'sections/footer.html' %}
  <script src="{{ 'assets/js/main.js' | asset_url }}" defer></script>
</body>
</html>
