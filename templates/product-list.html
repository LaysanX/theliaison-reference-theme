<!doctype html>
<html lang="{{ site.language | default: 'en' }}">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ seo.title | default: 'Products' }}</title>
  <link rel="stylesheet" href="{{ 'assets/css/style.css' | asset_url }}">
</head>
<body>
  {% render 'sections/header.html' %}
  <main>
    <section class="page-hero align-left">
      <div class="container">
        <span class="eyebrow">Products</span>
        <h1>{{ page.title | default: 'Products' }}</h1>
        <p>{{ page.subheading }}</p>
      </div>
    </section>
    {% render 'sections/products.html' %}
  </main>
  {% render 'sections/footer.html' %}
  <script src="{{ 'assets/js/main.js' | asset_url }}" defer></script>
</body>
</html>
