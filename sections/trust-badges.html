<section class="section">
  <div class="container">
    <div class="section-head">
      <span class="eyebrow">{{ sections.trust_badges.kicker | default: 'Trust' }}</span>
      <h2>{{ sections.trust_badges.title | default: 'Trust Badges' }}</h2>
      <p>{{ sections.trust_badges.description }}</p>
    </div>
    <div class="logo-grid">
      {% for item in trust_badges limit: section_controls.trust_badges.count %}
        <a class="logo-card" href="{{ item.url }}">
          <img src="{{ item.logo | default: 'assets/images/placeholder.svg' | asset_url }}" alt="{{ item.name }}">
          <span>{{ item.name }}</span>
        </a>
      {% endfor %}
    </div>
  </div>
</section>
