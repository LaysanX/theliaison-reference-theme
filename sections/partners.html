<section class="section">
  <div class="container">
    <div class="section-head">
      <span class="eyebrow">{{ sections.partners.kicker | default: 'Partners' }}</span>
      <h2>{{ sections.partners.title | default: 'Partners' }}</h2>
      <p>{{ sections.partners.description }}</p>
    </div>
    <div class="logo-grid">
      {% for item in partners limit: section_controls.partners.count %}
        <a class="logo-card" href="{{ item.url }}">
          <img src="{{ item.logo | default: 'assets/images/placeholder.svg' | asset_url }}" alt="{{ item.name }}">
          <span>{{ item.name }}</span>
        </a>
      {% endfor %}
    </div>
  </div>
</section>
