<section class="section">
  <div class="container">
    <div class="section-head">
      <span class="eyebrow">{{ sections.services.kicker | default: 'Services' }}</span>
      <h2>{{ sections.services.title | default: 'What We Do' }}</h2>
      <p>{{ sections.services.description }}</p>
    </div>
    <div class="card-grid columns-{{ section_controls.services.columns | default: 3 }}">
      {% for service in services limit: section_controls.services.count %}
        <article class="service-card">
          <img src="{{ service.image | default: 'assets/images/placeholder.svg' | asset_url }}" alt="{{ service.title }}">
          <div class="card-body">
            <h3>{{ service.title }}</h3>
            <p>{{ service.short_description }}</p>
            <a class="text-link" href="{{ service.url }}">View More</a>
          </div>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
