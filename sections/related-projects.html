<section class="section">
  <div class="container">
    <div class="section-head"><span class="eyebrow">Related</span><h2>Related Projects</h2></div>
    <div class="card-grid columns-3">
      {% for project in related_projects %}
        <article class="service-card"><img src="{{ project.image | default: 'assets/images/placeholder.svg' | asset_url }}" alt="{{ project.title }}"><div class="card-body"><h3>{{ project.title }}</h3><p>{{ project.short_description }}</p><a class="text-link" href="{{ project.url }}">View More</a></div></article>
      {% endfor %}
    </div>
  </div>
</section>
