<section class="section">
  <div class="container">
    <div class="section-head">
      <span class="eyebrow">{{ sections.projects.kicker | default: 'Projects' }}</span>
      <h2>{{ sections.projects.title | default: 'Featured Work' }}</h2>
      <p>{{ sections.projects.description }}</p>
    </div>
    <div class="card-grid columns-{{ section_controls.projects.columns | default: 3 }}">
      {% for project in projects limit: section_controls.projects.count %}
        <article class="feature-card">
          <img src="{{ project.image | default: 'assets/images/placeholder.svg' | asset_url }}" alt="{{ project.title }}">
          <h3>{{ project.title }}</h3>
          <p>{{ project.short_description }}</p>
          <a class="text-link" href="{{ project.url }}">View More</a>
        </article>
      {% endfor %}
    </div>
  </div>
</section>
