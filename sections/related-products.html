<section class="section">
  <div class="container">
    <div class="section-head"><span class="eyebrow">Related</span><h2>Related Products</h2></div>
    <div class="card-grid columns-3">
      {% for product in related_products %}
        <article class="service-card"><img src="{{ product.image | default: 'assets/images/placeholder.svg' | asset_url }}" alt="{{ product.title }}"><div class="card-body"><h3>{{ product.title }}</h3><p>{{ product.short_description }}</p><a class="text-link" href="{{ product.url }}">View More</a></div></article>
      {% endfor %}
    </div>
  </div>
</section>
