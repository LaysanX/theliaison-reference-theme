<section class="section">
  <div class="container">
    <div class="section-head"><span class="eyebrow">Related</span><h2>Related Services</h2></div>
    <div class="card-grid columns-3">
      {% for service in related_services %}
        <article class="service-card"><img src="{{ service.image | default: 'assets/images/placeholder.svg' | asset_url }}" alt="{{ service.title }}"><div class="card-body"><h3>{{ service.title }}</h3><p>{{ service.short_description }}</p><a class="text-link" href="{{ service.url }}">View More</a></div></article>
      {% endfor %}
    </div>
  </div>
</section>
