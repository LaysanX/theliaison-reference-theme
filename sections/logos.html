<section class="section">
  <div class="container">
    <div class="section-head">
      <span class="eyebrow">{{ title | default: 'Logos' }}</span>
      <h2>{{ heading | default: 'Trusted By' }}</h2>
    </div>
    <div class="logo-grid">
      {% for item in items %}
        <a class="logo-card" href="{{ item.url }}">
          <img src="{{ item.logo | default: 'assets/images/placeholder.svg' | asset_url }}" alt="{{ item.name }}">
          <span>{{ item.name }}</span>
        </a>
      {% endfor %}
    </div>
  </div>
</section>
